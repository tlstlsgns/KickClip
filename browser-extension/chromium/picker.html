<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KickClip</title>
  <style>
    :root {
      --brand: #BC13FE;
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --error: #dc2626;
      --success: #059669;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --fg: #f3f4f6;
        --muted: #9ca3af;
        --border: #374151;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 32px;
    }
    button#pick {
      background: var(--brand);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button#pick:hover { opacity: 0.9; }
    button#pick:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 24px;
      min-height: 24px;
      font-size: 14px;
    }
    #status.error { color: var(--error); }
    #status.success { color: var(--success); }
  </style>
</head>
<body>
  <div class="container">
    <h1>저장 폴더 설정</h1>
    <p>KickClip이 파일을 저장할 폴더를 선택하세요.<br><small style="opacity:0.7">※ Desktop, Downloads 같은 시스템 폴더는 Chrome 보안 정책으로 선택할 수 없습니다.</small></p>
    <button type="button" id="pick">📁 폴더 선택</button>
    <div id="status"></div>
  </div>
  <script src="config.js"></script>
  <script type="module" src="picker.js"></script>
</body>
</html>
