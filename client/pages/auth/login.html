<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blink - Sign In</title>
    <script src="../../brandConfig.js"></script>
    <script>
      try {
        const BRAND = window.BRAND || { NAME: 'Blink' };
        document.title = `${BRAND.NAME} - Sign In`;
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/styles/design-tokens.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        overflow: hidden;
        background: var(--bg-primary);
        font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: drag;
      }
      .login-container {
        -webkit-app-region: no-drag;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding: 32px;
        text-align: center;
      }
      .login-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: var(--blink-accent);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 28px;
      }
      .login-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text-primary);
      }
      .login-subtitle {
        font-size: 14px;
        color: var(--labels-secondary);
        max-width: 280px;
      }
      .signin-btn {
        background: var(--bg-secondary);
        border: 1px solid var(--bar-border);
        border-radius: var(--corner-small);
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-family: 'Roboto', sans-serif;
        font-weight: 500;
        font-size: 14px;
        color: var(--text-primary);
        transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        user-select: none;
      }
      .signin-btn:hover:not(.loading) {
        background: #757575;
        color: white;
        border-color: var(--bar-border);
      }
      .signin-btn.loading {
        background: black;
        color: var(--labels-secondary);
        font-style: italic;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-logo" data-brand-initial>B</div>
      <h1 class="login-title" data-brand-name>Sign in to Blink</h1>
      <p class="login-subtitle">Save URLs and images from your browser. Sign in with Google to get started.</p>
      <button id="signin-btn" class="signin-btn">Sign in with Google</button>
    </div>
    <script src="../../shared/utils/api.js"></script>
    <script src="./login.js"></script>
  </body>
</html>
