<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blink - Application</title>
    <script src="./brandConfig.js"></script>
    <script>
      try {
        const BRAND = window.BRAND || { NAME: 'Blink' };
        document.title = `${BRAND.NAME} - Application`;
      } catch (e) {}
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      /* Consolidated Design Tokens */
      :root {
        --bg-primary: #f2f2f7;
        --bg-secondary: #F2F2F7;
        --bg-body: #F9FAFB;
        --border-default: #d9d9d9;
        --border-secondary: #757575;
        /* Brand accent (set dynamically from `window.BRAND.KEY_COLOR_HEX` via `client/brandConfig.js`) */
        --blink-accent: var(--blink-accent, #BC13FE);
        --blink-accent-rgb: var(--blink-accent-rgb, 188, 19, 254);
        --border-active: var(--blink-accent);
        --bar-border: rgba(0, 0, 0, 0.3);
        --text-primary: #000000;
        --text-secondary: rgba(0, 0, 0, 0.2);
        --labels-secondary: rgba(60, 60, 67, 0.6);
        --overlay-default: rgba(0, 0, 0, 0.2);
        --space-50: 2px;
        --space-100: 4px;
        --space-150: 6px;
        --space-200: 8px;
        --space-300: 12px;
        --space-400: 16px;
        --corner-extra-small: 4px;
        --corner-small: 6px;
        --corner-medium: 12px;
        --scroll-blur: 10px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg-primary);
        margin: 0;
        padding: 0;
        display: flex;
      }

      /* Main Application Layout - Flexbox with Dock on Left, Content on Right */
      #app-container {
        width: 100%;
        height: 100vh;
        display: flex;
        overflow: hidden;
      }

      /* ========== DOCK CONTAINER (Left Sidebar) ========== */
      #dock-container {
        width: 250px;
        min-width: 250px;
        max-width: 250px;
        height: 100vh;
        background: var(--bg-primary);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        gap: 10px;
        border-right: 1px solid var(--border-default);
      }

      /* Dock Header */
      #dock-header {
        width: 100%;
        height: 50px;
        padding: 10px;
        border-bottom: 1px solid var(--border-default);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #header-profile {
        display: none;
        align-items: center;
        gap: 6px;
        flex: 1;
        min-width: 0;
        height: 100%;
      }

      #header-profile.active {
        display: flex;
      }

      #profile-image {
        width: 30px;
        height: 30px;
        background: white;
        border-radius: 30px;
        flex-shrink: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      #profile-infos {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
        flex: 1;
        line-height: 1.3;
        letter-spacing: 0.1px;
      }

      .profile-name {
        font-family: 'Roboto', sans-serif;
        font-weight: 600;
        font-size: 14px;
        line-height: 1.3;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-variation-settings: 'wdth' 100;
      }

      .profile-email {
        font-family: 'Roboto', sans-serif;
        font-style: italic;
        font-weight: 400;
        font-size: 9px;
        line-height: 1.3;
        color: var(--overlay-default);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-variation-settings: 'wdth' 100;
      }

      #header-social {
        display: none;
        align-items: center;
        justify-content: flex-end;
        flex: 1 1 0%;
        min-width: 0;
        min-height: 0;
        height: 100%;
      }

      #header-social.active {
        display: flex;
      }

      #social-insta {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        cursor: pointer;
        position: relative;
      }

      #social-insta img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* Dock Main */
      #dock-main {
        width: 100%;
        height: 100%;
        flex: 1 1 0%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        gap: 10px;
        align-self: stretch;
      }

      #dock-placeholder {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #dock-placeholder.hidden {
        display: none;
      }

      #dock-function {
        display: none;
        flex-direction: row;
        align-items: center;
        padding: 0 10px;
        width: 100%;
        height: auto;
        flex-shrink: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }

      #dock-function.active {
        display: flex;
      }

      #trash-zone {
        width: 100%;
        height: 136px;
        border: 2px dashed var(--border-default);
        border-radius: var(--corner-small);
        background: var(--bg-primary);
        display: flex !important;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        flex-shrink: 0;
        z-index: 999999 !important;
        pointer-events: auto !important;
        position: relative;
      }

      #trash-zone.drag-over {
        transform: scale(1.1);
        background-color: rgba(255, 0, 0, 0.2);
        border-color: var(--border-active);
        border-style: solid;
      }

      #trash-zone svg {
        width: 18px;
        height: 18px;
        stroke: var(--text-secondary);
        transition: stroke 0.2s;
      }

      #trash-zone.drag-over svg {
        stroke: var(--border-active);
      }

      #trash-zone:hover {
        border-color: var(--border-secondary);
        background: rgba(0, 0, 0, 0.05);
      }

      #trash-zone:hover svg {
        stroke: var(--border-secondary);
      }

      #dock-itemlist {
        display: none;
        flex-direction: column;
        padding: 10px;
        gap: var(--space-100);
        width: 100%;
        flex: 1 1 0%;
        min-height: 0;
        min-width: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }

      #dock-itemlist.active {
        display: flex;
        flex: 1 1 0%;
      }

      .signin-btn {
        background: white;
        border: 1px solid var(--bar-border);
        border-radius: var(--corner-small);
        padding: 5px 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-family: 'Roboto', sans-serif;
        font-weight: 500;
        font-size: 14px;
        line-height: 20px;
        letter-spacing: 0.1px;
        color: var(--text-primary);
        white-space: nowrap;
        transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        user-select: none;
        font-variation-settings: 'wdth' 100;
      }

      .signin-btn:hover {
        background: #757575;
        color: white;
        border-color: var(--bar-border);
      }

      .signin-btn.loading {
        background: black;
        color: var(--labels-secondary);
        font-style: italic;
        cursor: not-allowed;
      }

      .signin-btn.loading:hover {
        background: black;
        color: var(--labels-secondary);
      }

      /* DataCard Component */
      .data-card {
        background: white;
        border: 1px solid var(--border-default);
        border-radius: var(--corner-extra-small);
        padding: var(--space-150) var(--space-200);
        display: flex;
        flex-direction: column;
        gap: var(--space-100);
        width: 100%;
        cursor: grab;
        transition: border-color 0.2s, box-shadow 0.2s;
        flex-shrink: 0;
        -webkit-user-drag: element !important;
        user-select: none;
      }

      .data-card * {
        pointer-events: none !important;
      }

      .data-card:hover {
        border-color: var(--border-secondary);
        box-shadow: 0px 0px 4px 0px rgba(0, 0, 0, 0.25);
      }

      .data-card.active {
        border-color: var(--border-active);
        box-shadow: 0px 0px 4px 0px rgba(0, 0, 0, 0.25);
      }

      .data-card.dragging {
        opacity: 0.8;
        pointer-events: none !important;
      }

      .data-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        flex-shrink: 0;
      }

      .data-card-domain-section {
        display: flex;
        align-items: center;
        gap: 2px;
        flex-shrink: 0;
        min-width: 0;
      }

      .data-card-favicon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        object-fit: contain;
      }

      .data-card-domain-text {
        font-family: 'Roboto', sans-serif;
        font-weight: 500;
        font-size: 10px;
        line-height: 1.3;
        color: var(--overlay-default);
        white-space: nowrap;
        letter-spacing: 0.1px;
      }

      .data-card-date-text {
        font-family: 'Roboto', sans-serif;
        font-weight: 500;
        font-size: 10px;
        line-height: 1.3;
        color: var(--overlay-default);
        white-space: nowrap;
        letter-spacing: 0.1px;
        flex-shrink: 0;
      }

      .data-card-main {
        display: flex;
        flex-direction: column;
        gap: var(--space-100);
        width: 100%;
      }

      .data-card-imgcontainer {
        width: 100%;
        height: 76px;
        border-radius: var(--corner-small);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background: var(--bg-primary);
        transition: height 0.3s ease;
      }

      .data-card.active .data-card-imgcontainer {
        height: auto;
        min-height: 76px;
      }

      .data-card-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .data-card.active .data-card-image {
        height: auto;
        max-height: none;
        object-fit: contain;
      }

      .data-card-title {
        font-family: 'Roboto', sans-serif;
        font-weight: 600;
        font-size: 14px;
        line-height: 20px;
        letter-spacing: 0.1px;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        width: 100%;
        flex-shrink: 0;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(var(--blink-accent-rgb), 0.22);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(var(--blink-accent-rgb), 0.30);
      }

      /* ========== CONTENT AREA (Right Section) ========== */
      #content-area {
        flex: 1;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-secondary);
      }

      #content-placeholder {
        text-align: center;
        color: var(--text-secondary);
        font-family: 'Roboto', sans-serif;
        font-size: 16px;
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div id="app-container">
      <!-- Dock Container (Left Sidebar) -->
      <div id="dock-container">
        <!-- Header -->
        <div id="dock-header">
          <!-- SignInBtn (Default state) -->
          <button id="signin-btn" class="signin-btn">Sign-In</button>

          <!-- Profile Section (User state) -->
          <div id="header-profile">
            <div id="profile-image"></div>
            <div id="profile-infos">
              <div class="profile-name" id="profile-name">UserName</div>
              <div class="profile-email" id="profile-email">user@example.com</div>
            </div>
          </div>

          <!-- Social Section (User state) -->
          <div id="header-social">
            <div id="social-insta" title="Connect Instagram">
              <!-- Instagram icon will be inserted here via JS -->
            </div>
          </div>
        </div>

        <!-- Main -->
        <div id="dock-main">
          <!-- PlaceHolder (Default state) -->
          <div id="dock-placeholder"></div>

          <!-- Function Section (User state) -->
          <div id="dock-function">
            <div id="trash-zone" title="Drag DataCard here to delete">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </div>
          </div>

          <!-- ItemList Section (User state) -->
          <div id="dock-itemlist"></div>
        </div>
      </div>

      <!-- Content Area (Right Section) -->
      <div id="content-area">
        <div id="content-placeholder">Not updated yet</div>
      </div>
    </div>

    <script src="viewer.js"></script>
  </body>
</html>
