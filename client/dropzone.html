<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drop Zone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    .text-title-small {
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      letter-spacing: 0.1px;
    }
    #drop-zone {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0.3;
      pointer-events: auto;
      transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out, background-color 0.2s ease-in-out;
    }
    #drop-zone:hover {
      opacity: 0.6;
    }
    #drop-zone.show {
      opacity: 1;
      background-color: rgba(0, 123, 255, 0.1);
    }
    #drop-zone.drag-over {
      opacity: 1;
      transform: scale(1.05);
      background-color: rgba(0, 123, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="drop-zone" class="w-64 h-12 rounded-lg border-2 border-dashed border-[rgba(0,123,255,0.5)] bg-[rgba(255,255,255,0.95)] backdrop-blur-sm shadow-lg flex items-center justify-center cursor-pointer">
    <span class="text-title-small text-[rgba(0,123,255,0.8)]">📥 Drop to save</span>
  </div>
  <script src="dropzone.js"></script>
</body>
</html>
