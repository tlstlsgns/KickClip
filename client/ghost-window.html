<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag Ghost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      width: 100%;
    }
    
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    #ghost-content {
      width: 100%;
      height: 100%;
      opacity: 0.85;
      transform: scale(0.9);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }
    
    #ghost-content.fade-out {
      opacity: 0;
      transform: scale(0.8);
    }
    
    /* Import DataCard styles from dock.html */
    :root {
      --bg-primary: #f2f2f7;
      --border-default: #d9d9d9;
      --border-secondary: #757575;
      /* Brand accent (set dynamically from `window.BRAND.KEY_COLOR_HEX` via `client/brandConfig.js`) */
      --blink-accent: var(--blink-accent, #BC13FE);
      --blink-accent-rgb: var(--blink-accent-rgb, 188, 19, 254);
      --border-active: var(--blink-accent);
      --bar-border: rgba(0, 0, 0, 0.3);
      --text-primary: #000000;
      --text-secondary: rgba(0, 0, 0, 0.2);
      --labels-secondary: rgba(60, 60, 67, 0.6);
      --overlay-default: rgba(0, 0, 0, 0.2);
      --space-100: 4px;
      --space-150: 6px;
      --space-200: 8px;
      --corner-extra-small: 4px;
      --corner-small: 6px;
      --corner-medium: 12px;
    }
    
    .data-card {
      background: white;
      border: 1px solid var(--border-default);
      border-radius: var(--corner-extra-small);
      padding: var(--space-150) var(--space-200);
      display: flex;
      flex-direction: column;
      gap: var(--space-100);
      width: 100%;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.3s ease, transform 0.3s ease;
      flex-shrink: 0;
    }
    
    .data-card-header {
      display: none;
    }
    
    .data-card-domain-section {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      min-width: 0;
    }
    
    .data-card-domain-text {
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 10px;
      line-height: 1.3;
      color: var(--overlay-default);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.1px;
    }
    
    .data-card-main {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: var(--space-100);
      width: 100%;
      min-width: 0;
    }
    
    .data-card-imgcontainer {
      width: 40px;
      height: 40px;
      min-width: 40px;
      min-height: 40px;
      margin-right: 6px;
      border-radius: var(--corner-small);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--bg-primary);
    }
    
    .data-card-imgcontainer.is-favicon {
      border-radius: 50%;
      overflow: hidden;
      background-color: #f0f0f0;
    }
    
    .data-card-imgcontainer.is-favicon .data-card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .data-card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .data-card-context {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      flex: 1;
      align-self: stretch;
    }
    
    .data-card-main p.data-card-title {
      min-width: 0;
      margin: 0 0 2px 0;
    }
    
    .data-card-title {
      font-family: 'Roboto', sans-serif;
      font-weight: 600;
      font-size: 12px;
      line-height: 1.3;
      letter-spacing: 0.1px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    
    .data-card-url {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 11px;
      line-height: 1.3;
      color: #aaa;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="ghost-content"></div>
  <script>
    const { ipcRenderer } = require('electron');
    
    // Receive card HTML content from main process
    ipcRenderer.on('ghost:set-content', (event, htmlContent) => {
      const content = document.getElementById('ghost-content');
      if (content) {
        content.innerHTML = htmlContent;
      }
    });
    
    // Fade out animation
    ipcRenderer.on('ghost:fade-out', () => {
      const content = document.getElementById('ghost-content');
      if (content) {
        content.classList.add('fade-out');
      }
    });
    
    // Ready signal
    ipcRenderer.send('ghost:ready');
  </script>
</body>
</html>
